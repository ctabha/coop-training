<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <title>بوابة التدريب التعاوني</title>
</head>
<body>

  <div class="page">
    <div class="header-wrap">
      <img class="header-img" src="{{ url_for('static', filename='header.jpg') }}" alt="header">
    </div>

    <div class="card">
      <h1>بوابة خطاب التوجيه - التدريب التعاوني</h1>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <form method="post">
        <input type="text" name="trainee_id" placeholder="الرقم التدريبي / رقم المتدرب" required>
        <input type="text" name="last4" placeholder="آخر 4 أرقام من الجوال" required>
        <button type="submit">دخول</button>
      </form>
    </div>
  </div>

</body>
</html>
