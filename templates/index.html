<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>بوابة التدريب التعاوني</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-bg">
  <div class="site-header">
    <img src="/static/header.jpg" alt="header">
  </div>

  <div class="card">
    <h1>بوابة التدريب التعاوني</h1>

    <form method="POST">
      <input type="text" name="trainee_id" placeholder="الرقم التدريبي / رقم المتدرب" required>
      <input type="text" name="last4" placeholder="آخر 4 أرقام من الجوال" required>
      <button type="submit">دخول</button>
    </form>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
  </div>
</body>
</html>
