<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>بوابة خطاب التوجيه - التدريب التعاوني</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header-wrap">
  <img src="/static/header.jpg" alt="header">
</div>

<div class="container">
  <div class="card">
    <h1>بوابة خطاب التوجيه - التدريب التعاوني</h1>

    <form method="post">
      <div class="field">
        <input name="trainee_id" placeholder="الرقم التدريبي / رقم المتدرب" autocomplete="off">
      </div>

      <div class="field">
        <input name="last4" placeholder="آخر 4 أرقام من الجوال" autocomplete="off">
      </div>

      <button type="submit">دخول</button>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
    </form>

  </div>
</div>

</body>
</html>
