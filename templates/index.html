<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>بوابة خطاب التوجيه - التدريب التعاوني</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>بوابة خطاب التوجيه - التدريب التعاوني</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="msgs">
            {% for cat,msg in messages %}
              <div class="msg {{cat}}">{{msg}}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post" class="form">
        <label>الرقم التدريبي / رقم المتدرب</label>
        <input name="trainee_id" placeholder="مثال: 444242291" required>

        <label>آخر 4 أرقام من الجوال (اختياري)</label>
        <input name="phone_last4" placeholder="مثال: 5513">

        <button type="submit">دخول</button>
      </form>
    </div>
  </div>
</body>
</html>
