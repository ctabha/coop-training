<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>بوابة خطاب التوجيه - التدريب التعاوني</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page-header"></div>

  <div class="container">
    <div class="card">
      <h1>بوابة خطاب التوجيه - التدريب التعاوني</h1>
      <p class="muted">أدخل رقم المتدرب + آخر 4 أرقام من رقم الجوال للتأكيد</p>

      <form method="POST" class="form-row">
        <input name="trainee_id" placeholder="الرقم التدريبي / رقم المتدرب" required>
        <input name="last4" placeholder="آخر 4 أرقام من الجوال" required>
        <button type="submit">دخول</button>
      </form>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
    </div>
  </div>
</body>
</html>
