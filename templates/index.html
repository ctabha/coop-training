<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>بوابة خطاب التوجيه - التدريب التعاوني</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="page">
    <header class="top">
      <img class="header-img" src="{{ url_for('static', filename='header.jpg') }}" alt="Header">
    </header>

    <main class="card">
      <h1>بوابة خطاب التوجيه - التدريب التعاوني</h1>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert">
            {% for m in messages %}
              <div>{{ m }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post" class="form">
        <input name="trainee_id" placeholder="الرقم التدريبي / رقم المتدرب" required>
        <input name="last4" placeholder="آخر 4 أرقام من الجوال" required>
        <button type="submit">دخول</button>
      </form>
    </main>
  </div>

</body>
</html>
