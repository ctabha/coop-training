<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8">
<title>لوحة المتدرب</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">
<img src="/static/header.jpg">
</div>

<div class="container">

<div class="card">

<h2>بيانات المتدرب</h2>

<p>الاسم: {{trainee.name}}</p>
<p>رقم المتدرب: {{trainee.trainee_id}}</p>
<p>رقم الجوال: {{trainee.phone}}</p>
<p>التخصص: {{trainee.specialty}}</p>
<p>البرنامج: {{trainee.program}}</p>

<hr>

{% if chosen %}

<p>تم اختيار جهة التدريب: {{chosen}}</p>

<a href="/pdf/{{trainee.trainee_id}}">
<button>تحميل خطاب التوجيه PDF</button>
</a>

{% else %}

<form method="post" action="/choose/{{trainee.trainee_id}}">

<select name="entity" required>

<option value="">اختر جهة التدريب</option>

{% for e in entities %}
<option value="{{e}}">{{e}}</option>
{% endfor %}

</select>

<button type="submit">تأكيد الاختيار</button>

</form>

{% endif %}

</div>

</div>

</body>
</html>
